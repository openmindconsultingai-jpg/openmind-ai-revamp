<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenMind AI - Interaktywna Sieć Neuronowa</title>
<style>
  :root {
    --teal: #4fe0d4;
    --blue: #6aa8ff;
    --ink: #eaf2ff;
    --muted: rgba(234, 242, 255, .58);
    --line: rgba(79, 224, 212, .25);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; background: transparent !important; }
  body {
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    background: transparent !important;
  }

  #stage { position: fixed; inset: 0; touch-action: none; background: transparent !important; }
  canvas { display: block; background: transparent !important; }

  /* Hide vignette/brand/hint — only the 3D model + hover tip are kept */
  #vignette, #brand, #hint { display: none !important; }

  #brand {
    position: fixed;
    z-index: 5;
    top: clamp(22px, 5vh, 52px);
    left: clamp(22px, 5vw, 64px);
    pointer-events: none;
  }

  .eyebrow {
    margin-bottom: 16px;
    color: var(--teal);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .38em;
    text-transform: uppercase;
    opacity: 0;
    animation: rise 1.2s .25s ease forwards;
  }

  h1 {
    font-size: clamp(32px, 5.4vw, 68px);
    font-weight: 230;
    letter-spacing: 0;
    line-height: 1;
    text-shadow: 0 0 60px rgba(79, 224, 212, .35);
  }

  h1 span { display: block; opacity: 0; animation: rise 1.35s ease forwards; }
  h1 span:first-child { animation-delay: .45s; }
  h1 span:last-child {
    animation-delay: .66s;
    font-weight: 560;
    background: linear-gradient(100deg, var(--teal), var(--blue));
    background-clip: text;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  #brand p {
    max-width: 34ch;
    margin-top: 22px;
    color: var(--muted);
    font-size: clamp(14px, 1.5vw, 17px);
    font-weight: 300;
    line-height: 1.55;
    opacity: 0;
    animation: rise 1.4s .95s ease forwards;
  }

  #hint {
    position: fixed;
    z-index: 5;
    bottom: clamp(20px, 4vh, 40px);
    left: 50%;
    transform: translateX(-50%);
    color: rgba(234, 242, 255, .42);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: .24em;
    pointer-events: none;
    text-align: center;
    text-transform: uppercase;
    white-space: nowrap;
    opacity: 0;
    animation: rise 1.4s 1.35s ease forwards;
  }

  #hint .dot {
    display: inline-block;
    width: 5px;
    height: 5px;
    margin: 0 10px 2px;
    border-radius: 50%;
    background: var(--teal);
    box-shadow: 0 0 12px var(--teal);
    animation: pulse 2.2s ease-in-out infinite;
  }

  #tip {
    position: fixed;
    z-index: 7;
    left: 0;
    top: 0;
    width: max-content;
    max-width: min(310px, calc(100vw - 24px));
    opacity: 0;
    pointer-events: none;
    transform: translate(0, 0) scale(.96);
    transition: opacity .24s ease, transform .24s ease;
  }

  #tip.show { opacity: 1; }

  .bubble {
    position: relative;
    padding: 16px 19px 18px;
    border: 1px solid var(--line);
    border-radius: 12px;
    background: linear-gradient(160deg, rgba(15, 39, 66, .94), rgba(8, 18, 34, .92));
    box-shadow: 0 24px 60px rgba(0, 0, 0, .56), inset 0 1px 0 rgba(255, 255, 255, .06);
    backdrop-filter: blur(16px) saturate(1.2);
  }

  .bubble::after {
    content: "";
    position: absolute;
    left: 28px;
    bottom: -7px;
    width: 14px;
    height: 14px;
    border-right: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    background: rgba(10, 22, 40, .92);
    transform: rotate(45deg);
  }

  #tip-ic { display: block; margin-bottom: 10px; font-size: 22px; line-height: 1; }
  #tip-title { margin-bottom: 7px; font-size: 16px; font-weight: 650; letter-spacing: 0; }
  #tip-body { color: rgba(234, 242, 255, .76); font-size: 12.5px; font-weight: 300; line-height: 1.55; }

  @keyframes rise {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes pulse {
    0%, 100% { opacity: .35; transform: scale(.8); }
    50% { opacity: 1; transform: scale(1.35); }
  }

  @media (max-width: 720px) {
    #brand { max-width: calc(100vw - 44px); }
    #brand p { max-width: 28ch; }
    #hint { width: calc(100vw - 32px); white-space: normal; line-height: 1.7; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: .01ms !important; scroll-behavior: auto !important; }
  }
</style>
</head>

<script type="module">

import { UnrealBloomPass } from "three/addons/postprocessing/UnrealBloomPass.js";

const NODES = [
  { ic: "🧭", title: "Doradztwo strategiczne", body: "Wskazujemy, gdzie AI realnie zwiększy zyski. Mapa wdrożeń, priorytety i ROI dopasowane do Twojej branży." },
  { ic: "🤖", title: "Wdrożenia AI", body: "Od modeli językowych po architektury RAG - projektujemy i uruchamiamy systemy AI gotowe do pracy w Twojej firmie." },
  { ic: "💬", title: "Chatboty i Voiceboty 24/7", body: "Asystenci, którzy odpowiadają klientom o każdej porze - na stronie, telefonie i w komunikatorach." },
  { ic: "📱", title: "Aplikacje web i mobilne", body: "Tworzymy aplikacje napędzane AI: szybkie, intuicyjne i skrojone pod Twój proces biznesowy." },
  { ic: "⚙️", title: "Automatyzacja procesów", body: "Eliminujemy powtarzalną pracę. Automatyzujemy obieg dokumentów, raporty i przepływy między systemami." },

  { ic: "🧑‍💻", title: "Awatary do kampanii", body: "Realistyczne awatary AI prezentujące Twoją markę w wideo, reklamach i mediach społecznościowych." },

  { ic: "🧠", title: "Konsultacje", body: "Indywidualne sesje eksperckie - projektujemy ścieżkę wdrożenia AI w Twojej organizacji." }
];

const SERVICE_LINKS = [
  "https://www.openmindai.pl/services/web",
  "https://www.openmindai.pl/services/automation",
  "https://www.openmindai.pl/services/automation",
  "https://www.openmindai.pl/services/web",
  "https://www.openmindai.pl/services/automation",
  "https://www.openmindai.pl/services/automation",
  "https://www.openmindai.pl/services/creative",
  "https://www.openmindai.pl/services/creative",
  "https://www.openmindai.pl/services/web",
  "https://www.openmindai.pl/services/automation",
  "https://www.openmindai.pl/services/education",
  "https://www.openmindai.pl/services/education"
];
NODES.forEach((node, index) => { node.url = SERVICE_LINKS[index]; });
const stage = document.getElementById("stage");
const tip = document.getElementById("tip");
const tipIcon = document.getElementById("tip-ic");
const tipTitle = document.getElementById("tip-title");
const tipBody = document.getElementById("tip-body");

const scene = new THREE.Scene();
scene.background = null;
scene.fog = null;

const camera = new THREE.PerspectiveCamera(42, innerWidth / innerHeight, 0.1, 300);
camera.position.set(0, 0, 27);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, premultipliedAlpha: false });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.setClearColor(0x000000, 0);
renderer.autoClearColor = false;
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.08;
stage.appendChild(renderer.domElement);
renderer.domElement.style.cursor = "grab";

const composer = new EffectComposer(renderer);
composer.renderTarget1.texture.format = THREE.RGBAFormat;
composer.renderTarget2.texture.format = THREE.RGBAFormat;
const renderPass = new RenderPass(scene, camera);
renderPass.clearAlpha = 0;
composer.addPass(renderPass);
composer.addPass(new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), .92, .42, .16));

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = .05;
controls.rotateSpeed = .45;
controls.enablePan = false;
controls.minDistance = 17;
controls.maxDistance = 48;
controls.autoRotate = true;
controls.autoRotateSpeed = .55;

const root = new THREE.Group();
scene.add(root);

const logoScene = new THREE.Scene();

function makeDotTexture() {
  const size = 128;
  const canvas = document.createElement("canvas");
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext("2d");
  const grad = ctx.createRadialGradient(size / 2, size / 2, 0, size / 2, size / 2, size / 2);
  grad.addColorStop(0, "rgba(255,255,255,1)");
  grad.addColorStop(.35, "rgba(255,255,255,.76)");
  grad.addColorStop(1, "rgba(255,255,255,0)");
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, size, size);
  return new THREE.CanvasTexture(canvas);
}

const DOT = makeDotTexture();
const LOGO_SRC = "openmind-logo-transparent.png?v=20260626-neural-clean";
const PALETTE = [0x4fe0d4, 0x6aa8ff, 0x8ff0e6, 0x5b9dff];
const RAD = 11;

const core1 = new THREE.Sprite(new THREE.SpriteMaterial({
  map: DOT,
  color: 0x7ff0e6,
  transparent: true,
  opacity: .11,
  blending: THREE.AdditiveBlending,
  depthWrite: false
}));
core1.scale.setScalar(13.5);
root.add(core1);

const core2 = new THREE.Sprite(new THREE.SpriteMaterial({
  map: DOT,
  color: 0x6aa8ff,
  transparent: true,
  opacity: .075,
  blending: THREE.AdditiveBlending,
  depthWrite: false
}));
core2.scale.setScalar(22);
root.add(core2);

const logoPlane = new THREE.Mesh(new THREE.PlaneGeometry(1, 1), new THREE.MeshBasicMaterial({
  map: null,
  transparent: true,
  opacity: 0,
  blending: THREE.NormalBlending,
  side: THREE.DoubleSide,
  toneMapped: false,
  alphaTest: .02,
  depthTest: false,
  depthWrite: false
}));
logoPlane.userData.baseWidth = 4.9;
logoPlane.userData.baseHeight = 5.8;
logoPlane.scale.set(logoPlane.userData.baseWidth, logoPlane.userData.baseHeight, 1);
logoScene.add(logoPlane);

new THREE.TextureLoader().load(LOGO_SRC, (texture) => {
  texture.colorSpace = THREE.SRGBColorSpace;
  texture.anisotropy = 8;
  texture.minFilter = THREE.LinearMipmapLinearFilter;
  texture.magFilter = THREE.LinearFilter;
  logoPlane.material.map = texture;
  logoPlane.material.needsUpdate = true;

  const ratio = texture.image.width / texture.image.height;
  logoPlane.userData.baseHeight = 5.8;
  logoPlane.userData.baseWidth = logoPlane.userData.baseHeight * ratio;
  logoPlane.scale.set(logoPlane.userData.baseWidth, logoPlane.userData.baseHeight, 1);
});

function shell(count, size, opacity, color, spread) {
  const positions = new Float32Array(count * 3);
  for (let i = 0; i < count; i++) {
    const radius = RAD * (.55 + Math.random() * spread);
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    positions[i * 3] = Math.cos(theta) * Math.sin(phi) * radius;
    positions[i * 3 + 1] = Math.cos(phi) * radius;
    positions[i * 3 + 2] = Math.sin(theta) * Math.sin(phi) * radius;
  }

  const geometry = new THREE.BufferGeometry();
  geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));
  const points = new THREE.Points(geometry, new THREE.PointsMaterial({
    size,
    map: DOT,
    color,
    transparent: true,
    opacity,
    blending: THREE.AdditiveBlending,
    depthWrite: false
  }));
  root.add(points);
  return points;
}

const dustA = shell(280, .5, .7, 0x4fe0d4, .7);
const dustB = shell(180, .8, .55, 0x6aa8ff, .55);
const dustC = shell(90, 1.3, .6, 0xbff7f0, .4);

const nodeGroup = new THREE.Group();
root.add(nodeGroup);

const nodes = [];
const golden = Math.PI * (3 - Math.sqrt(5));

NODES.forEach((data, index) => {
  const y = 1 - (index / (NODES.length - 1)) * 2;
  const radius = Math.sqrt(1 - y * y);
  const theta = golden * index;
  const position = new THREE.Vector3(Math.cos(theta) * radius * RAD, y * RAD, Math.sin(theta) * radius * RAD);
  const color = PALETTE[index % PALETTE.length];

  const core = new THREE.Mesh(
    new THREE.SphereGeometry(.42, 30, 30),
    new THREE.MeshStandardMaterial({
      color: 0xffffff,
      emissive: color,
      emissiveIntensity: 2.4,
      roughness: .2,
      metalness: .12
    })
  );
  core.position.copy(position);

  const glow = new THREE.Sprite(new THREE.SpriteMaterial({
    map: DOT,
    color,
    transparent: true,
    opacity: .85,
    blending: THREE.AdditiveBlending,
    depthWrite: false
  }));
  glow.position.copy(position);
  glow.scale.setScalar(3);

  const ring = new THREE.Mesh(
    new THREE.TorusGeometry(1.18, .03, 8, 46),
    new THREE.MeshBasicMaterial({
      color,
      transparent: true,
      opacity: 0,
      blending: THREE.AdditiveBlending,
      depthWrite: false
    })
  );
  ring.position.copy(position);
  ring.lookAt(0, 0, 0);

  nodeGroup.add(core, glow, ring);
  nodes.push({ core, glow, ring, position, color, data, targetEmissive: 2.4, targetGlow: .85, targetRing: 0, phase: Math.random() * Math.PI * 2 });
});

const linePositions = [];
const linkPairs = [];
const pairKeys = new Set();
const connectionCount = Array(nodes.length).fill(0);

function connect(a, b) {
  if (a === b) return;
  const key = a < b ? `${a}:${b}` : `${b}:${a}`;
  if (pairKeys.has(key)) return;
  pairKeys.add(key);
  linkPairs.push([a, b]);
  connectionCount[a]++;
  connectionCount[b]++;
  linePositions.push(...nodes[a].position.toArray(), ...nodes[b].position.toArray());
}

for (let i = 0; i < nodes.length; i++) {
  const closest = nodes
    .map((node, j) => ({ j, distance: nodes[i].position.distanceTo(node.position) }))
    .filter(({ j }) => j !== i)
    .sort((a, b) => a.distance - b.distance);

  for (let k = 0; k < 4; k++) connect(i, closest[k].j);
}

const upperRing = [0, 1, 2, 3];
const middleRing = [4, 5, 6, 7];
const lowerRing = [8, 9, 10, 11];
[upperRing, middleRing, lowerRing].forEach((ring) => {
  ring.forEach((nodeIndex, index) => connect(nodeIndex, ring[(index + 1) % ring.length]));
});

for (let i = 0; i < nodes.length; i++) {
  while (connectionCount[i] < 4) {
    const fallback = nodes
      .map((node, j) => ({ j, distance: nodes[i].position.distanceTo(node.position) }))
      .filter(({ j }) => j !== i)
      .sort((a, b) => a.distance - b.distance)
      .find(({ j }) => !pairKeys.has(i < j ? `${i}:${j}` : `${j}:${i}`));
    if (!fallback) break;
    connect(i, fallback.j);
  }
}

const lineGeometry = new THREE.BufferGeometry();
lineGeometry.setAttribute("position", new THREE.Float32BufferAttribute(linePositions, 3));
nodeGroup.add(new THREE.LineSegments(lineGeometry, new THREE.LineBasicMaterial({
  color: 0x4fe0d4,
  transparent: true,
  opacity: .28,
  blending: THREE.AdditiveBlending,
  depthWrite: false
})));

const PULSE_COUNT = 24;
const pulsePositions = new Float32Array(PULSE_COUNT * 3);
const pulseData = [];

for (let i = 0; i < PULSE_COUNT; i++) {
  const [a, b] = linkPairs[Math.floor(Math.random() * linkPairs.length)];
  pulseData.push({ a, b, t: Math.random(), speed: .004 + Math.random() * .008 });
}

const pulseGeometry = new THREE.BufferGeometry();
pulseGeometry.setAttribute("position", new THREE.BufferAttribute(pulsePositions, 3));
nodeGroup.add(new THREE.Points(pulseGeometry, new THREE.PointsMaterial({
  size: .7,
  map: DOT,
  color: 0xccfff8,
  transparent: true,
  opacity: 1,
  blending: THREE.AdditiveBlending,
  depthWrite: false
})));

scene.add(new THREE.AmbientLight(0x223355, .9));
const lightA = new THREE.PointLight(0x4fe0d4, 90, 80);
lightA.position.set(10, 8, 18);
scene.add(lightA);
const lightB = new THREE.PointLight(0x6aa8ff, 60, 80);
lightB.position.set(-14, -6, 10);
scene.add(lightB);

const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2(-2, -2);
const nodeCores = nodes.map((node) => node.core);
let hovered = null;
let mouseX = 0;
let mouseY = 0;
let pointerDownX = 0;
let pointerDownY = 0;
let dragged = false;
let time = 0;
let intro = 0;

renderer.domElement.addEventListener("pointerdown", (event) => {
  pointerDownX = event.clientX;
  pointerDownY = event.clientY;
  dragged = false;
});

renderer.domElement.addEventListener("pointermove", (event) => {
  mouse.x = (event.clientX / innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / innerHeight) * 2 + 1;
  mouseX = event.clientX;
  mouseY = event.clientY;
  if (Math.hypot(event.clientX - pointerDownX, event.clientY - pointerDownY) > 6) dragged = true;
});

renderer.domElement.addEventListener("pointerleave", () => {
  mouse.set(-2, -2);
  setHover(null);
});

renderer.domElement.addEventListener("click", () => {
  if (!dragged && hovered?.data?.url) window.top.location.href = hovered.data.url;
});

function setHover(node) {
  if (hovered === node) return;
  if (hovered) {
    hovered.targetEmissive = 2.4;
    hovered.targetGlow = .85;
    hovered.targetRing = 0;
  }

  hovered = node;
  controls.autoRotate = !node;
  renderer.domElement.style.cursor = node ? "pointer" : "grab";

  if (node) {
    node.targetEmissive = 5;
    node.targetGlow = 1.6;
    node.targetRing = .9;
    tipIcon.textContent = node.data.ic;
    tipTitle.textContent = node.data.title;
    tipBody.textContent = node.data.body;
    tip.classList.add("show");
    tip.setAttribute("aria-hidden", "false");
  } else {
    tip.classList.remove("show");
    tip.setAttribute("aria-hidden", "true");
  }
}

function placeTip() {
  if (!hovered) return;
  const width = tip.offsetWidth;
  const height = tip.offsetHeight;
  let x = mouseX - 28;
  let y = mouseY - height - 18;
  if (x + width > innerWidth - 12) x = innerWidth - width - 12;
  if (x < 12) x = 12;
  if (y < 12) y = mouseY + 24;
  tip.style.transform = `translate(${x}px, ${y}px) scale(1)`;
}

function animate() {
  requestAnimationFrame(animate);
  time += .01;

  if (intro < 1) {
    intro += .014;
    root.scale.setScalar(.78 + intro * .22);
  }

  const corePulse = 1 + Math.sin(time * 1.2) * .05;
  core1.scale.setScalar(13.5 * corePulse);
  core2.scale.setScalar(22 * corePulse);
  logoPlane.material.opacity += (1 - logoPlane.material.opacity) * .04;
  const logoPulse = 1 + Math.sin(time * 1.1) * .02;
  logoPlane.scale.set(logoPlane.userData.baseWidth * logoPulse, logoPlane.userData.baseHeight * logoPulse, 1);

  nodes.forEach((node) => {
    const pulse = 1 + Math.sin(time * 1.6 + node.phase) * .08;
    node.core.scale.setScalar(pulse);
    node.core.material.emissiveIntensity += (node.targetEmissive - node.core.material.emissiveIntensity) * .12;

    const targetScale = (hovered === node ? 4.4 : 3) * pulse;
    node.glow.scale.setScalar(node.glow.scale.x + (targetScale - node.glow.scale.x) * .12);
    node.glow.material.opacity += (node.targetGlow - node.glow.material.opacity) * .12;
    node.ring.material.opacity += (node.targetRing - node.ring.material.opacity) * .12;
    node.ring.rotation.x += .02;
    node.ring.rotation.y += .015;
  });

  pulseData.forEach((pulse, index) => {
    pulse.t += pulse.speed;
    if (pulse.t >= 1) {
      const [a, b] = linkPairs[Math.floor(Math.random() * linkPairs.length)];
      pulse.a = a;
      pulse.b = b;
      pulse.t = 0;
    }

    const from = nodes[pulse.a].position;
    const to = nodes[pulse.b].position;
    pulsePositions[index * 3] = from.x + (to.x - from.x) * pulse.t;
    pulsePositions[index * 3 + 1] = from.y + (to.y - from.y) * pulse.t;
    pulsePositions[index * 3 + 2] = from.z + (to.z - from.z) * pulse.t;
  });

  pulseGeometry.attributes.position.needsUpdate = true;
  dustA.rotation.y -= .0005;
  dustB.rotation.y += .0007;
  dustC.rotation.y -= .001;

  controls.update();
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(nodeCores, false);
  setHover(hits.length ? nodes[nodeCores.indexOf(hits[0].object)] : null);
  placeTip();
  composer.render();
  const previousAutoClear = renderer.autoClear;
  renderer.autoClear = false;
  renderer.clearDepth();
  renderer.render(logoScene, camera);
  renderer.autoClear = previousAutoClear;
}

addEventListener("resize", () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
});

animate();
</script>
</body>
</html>
