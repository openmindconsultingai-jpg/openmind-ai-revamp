<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenMind AI - Interaktywna Sieć Neuronowa</title>
<style>
  :root {
    --teal: #4fe0d4;
    --blue: #6aa8ff;
    --ink: #eaf2ff;
    --muted: rgba(234, 242, 255, .58);
    --line: rgba(79, 224, 212, .25);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; background: transparent !important; background-color: transparent !important; }
  body {
    font-family: "DM Sans", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }

  #stage { position: fixed; inset: 0; touch-action: none; background: transparent !important; }
  canvas { display: block; background: transparent !important; }

  #vignette { display: none; }

  #brand {
    position: fixed;
    z-index: 5;
    top: clamp(22px, 5vh, 52px);
    left: clamp(22px, 5vw, 64px);
    pointer-events: none;
  }

  .eyebrow {
    margin-bottom: 16px;
    color: var(--teal);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .38em;
    text-transform: uppercase;
    opacity: 0;
    animation: rise 1.2s .25s ease forwards;
  }

  h1 {
    font-size: clamp(32px, 5.4vw, 68px);
    font-weight: 230;
    letter-spacing: 0;
    line-height: 1;
    text-shadow: 0 0 60px rgba(79, 224, 212, .35);
  }

  h1 span { display: block; opacity: 0; animation: rise 1.35s ease forwards; }
  h1 span:first-child { animation-delay: .45s; }
  h1 span:last-child {
    animation-delay: .66s;
    font-weight: 560;
    background: linear-gradient(100deg, var(--teal), var(--blue));
    background-clip: text;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  #brand p {
    max-width: 34ch;
    margin-top: 22px;
    color: var(--muted);
    font-size: clamp(14px, 1.5vw, 17px);
    font-weight: 300;
    line-height: 1.55;
    opacity: 0;
    animation: rise 1.4s .95s ease forwards;
  }

  #hint {
    position: fixed;
    z-index: 5;
    bottom: clamp(20px, 4vh, 40px);
    left: 50%;
    transform: translateX(-50%);
    color: rgba(234, 242, 255, .42);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: .24em;
    pointer-events: none;
    text-align: center;
    text-transform: uppercase;
    white-space: nowrap;
    opacity: 0;
    animation: rise 1.4s 1.35s ease forwards;
  }

  #hint .dot {
    display: inline-block;
    width: 5px;
    height: 5px;
    margin: 0 10px 2px;
    border-radius: 50%;
    background: var(--teal);
    box-shadow: 0 0 12px var(--teal);
    animation: pulse 2.2s ease-in-out infinite;
  }

  #tip {
    position: fixed;
    z-index: 7;
    left: 0;
    top: 0;
    width: max-content;
    max-width: min(310px, calc(100vw - 24px));
    opacity: 0;
    pointer-events: none;
    transform: translate(0, 0) scale(.96);
    transition: opacity .24s ease, transform .24s ease;
    text-decoration: none;
    cursor: pointer;
    color: inherit;
  }

  #tip.show { opacity: 1; pointer-events: auto; }

  #tip-cta {
    display: inline-block;
    margin-top: 10px;
    padding: 6px 12px;
    border-radius: 999px;
    border: 1px solid rgba(0, 223, 217, 0.55);
    background: rgba(0, 223, 217, 0.12);
    color: var(--teal);
    font-family: "Outfit", "DM Sans", sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: .02em;
  }

  .bubble {
    position: relative;
    padding: 14px 18px 16px;
    border: 1px solid rgba(0, 223, 217, 0.4);
    border-radius: 16px;
    background: rgba(15, 23, 33, 0.30);
    box-shadow: 0 0 24px rgba(0, 223, 217, 0.18), 0 10px 25px rgba(0, 0, 0, 0.25);
    backdrop-filter: blur(20px) saturate(1.2);
    -webkit-backdrop-filter: blur(20px) saturate(1.2);
    font-family: "DM Sans", ui-sans-serif, system-ui, sans-serif;
  }

  .bubble::after {
    content: "";
    position: absolute;
    left: 28px;
    bottom: -7px;
    width: 14px;
    height: 14px;
    border-right: 1px solid rgba(0, 223, 217, 0.4);
    border-bottom: 1px solid rgba(0, 223, 217, 0.4);
    background: rgba(15, 23, 33, 0.30);
    backdrop-filter: blur(20px) saturate(1.2);
    -webkit-backdrop-filter: blur(20px) saturate(1.2);
    transform: rotate(45deg);
  }

  #tip-ic { display: block; margin-bottom: 10px; font-size: 22px; line-height: 1; }
  #tip-title { margin-bottom: 7px; font-size: 15px; font-weight: 600; letter-spacing: 0; font-family: "Outfit", "DM Sans", sans-serif; color: var(--ink); }
  #tip-body { color: rgba(234, 242, 255, .78); font-size: 12.5px; font-weight: 400; line-height: 1.55; font-family: "DM Sans", sans-serif; }

  @keyframes rise {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes pulse {
    0%, 100% { opacity: .35; transform: scale(.8); }
    50% { opacity: 1; transform: scale(1.35); }
  }

  @media (max-width: 720px) {
    #brand { max-width: calc(100vw - 44px); }
    #brand p { max-width: 28ch; }
    #hint { width: calc(100vw - 32px); white-space: normal; line-height: 1.7; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: .01ms !important; scroll-behavior: auto !important; }
  }
</style>

const camera = new THREE.PerspectiveCamera(48, innerWidth / innerHeight, 0.1, 300);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, premultipliedAlpha: false });
const PR = Math.min(devicePixelRatio || 1, 3);
renderer.setPixelRatio(PR);
renderer.setSize(innerWidth, innerHeight);
renderer.capabilities.getMaxAnisotropy && (renderer.maxAnisotropy = renderer.capabilities.getMaxAnisotropy());

// --- Selective additive bloom (transparency-preserving) -----------------
// Render scene directly to the canvas (transparent), then render a bloom
// pass to an offscreen RGBA render target with a fully transparent clear,
// and additively blit it on top of the canvas via a fullscreen quad.
const bloomRT = new THREE.WebGLRenderTarget(innerWidth * PR, innerHeight * PR, {
  type: THREE.HalfFloatType,
  format: THREE.RGBAFormat,
  colorSpace: THREE.LinearSRGBColorSpace,
  depthBuffer: false,
  stencilBuffer: false
});
const bloomComposer = new EffectComposer(renderer, bloomRT);
bloomComposer.setPixelRatio(PR);
bloomComposer.setSize(innerWidth, innerHeight);
bloomComposer.renderToScreen = false;
const bloomRenderPass = new RenderPass(scene, camera);
bloomRenderPass.clear = true;
bloomRenderPass.clearAlpha = 0;
bloomComposer.addPass(bloomRenderPass);
const bloomPass = new UnrealBloomPass(new THREE.Vector2(innerWidth * PR, innerHeight * PR), 0.45, 0.45, 0.38);
bloomComposer.addPass(bloomPass);

// Fullscreen quad that additively blits the bloom RT over the live canvas.
const blitScene = new THREE.Scene();
const blitCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
const blitMaterial = new THREE.ShaderMaterial({
  uniforms: { tDiffuse: { value: bloomComposer.renderTarget2.texture } },
  vertexShader: "varying vec2 vUv; void main(){ vUv = uv; gl_Position = vec4(position.xy, 0.0, 1.0); }",
  fragmentShader: "uniform sampler2D tDiffuse; varying vec2 vUv; void main(){ vec4 c = texture2D(tDiffuse, vUv); float a = clamp(max(c.r, max(c.g, c.b)), 0.0, 1.0); gl_FragColor = vec4(c.rgb, a); }",
  transparent: true,
  blending: THREE.AdditiveBlending,
  depthTest: false,
  depthWrite: false
});
const blitQuad = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), blitMaterial);
blitScene.add(blitQuad);

function makeDotTexture() {
  const size = 512;
  const canvas = document.createElement("canvas");
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext("2d");
  const grad = ctx.createRadialGradient(size / 2, size / 2, 0, size / 2, size / 2, size / 2);
  grad.addColorStop(0, "rgba(255,255,255,1)");
  grad.addColorStop(.35, "rgba(255,255,255,.76)");
  grad.addColorStop(1, "rgba(255,255,255,0)");
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, size, size);
  const tex = new THREE.CanvasTexture(canvas);
  tex.anisotropy = 16;
  tex.minFilter = THREE.LinearMipmapLinearFilter;
  tex.magFilter = THREE.LinearFilter;
  tex.generateMipmaps = true;
  return tex;
}

function shell(count, size, opacity, color, spread) {
  const positions = new Float32Array(count * 3);
  for (let i = 0; i < count; i++) {
    const radius = RAD * (.55 + Math.random() * spread);
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    positions[i * 3] = Math.cos(theta) * Math.sin(phi) * radius;
    positions[i * 3 + 1] = Math.cos(phi) * radius;
    positions[i * 3 + 2] = Math.sin(theta) * Math.sin(phi) * radius;
  }

  const geometry = new THREE.BufferGeometry();
  geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));
  const points = new THREE.Points(geometry, new THREE.PointsMaterial({
    size,
    map: DOT,
    color,
    transparent: true,
    opacity,
    blending: THREE.AdditiveBlending,
    depthWrite: false
  }));
  root.add(points);
  return points;
}

const dustA = shell(280, .5, .7, 0x4fe0d4, .7);
const dustB = shell(180, .8, .55, 0x6aa8ff, .55);
const dustC = shell(90, 1.3, .6, 0xbff7f0, .4);

const nodeGroup = new THREE.Group();
root.add(nodeGroup);

const nodes = [];
const golden = Math.PI * (3 - Math.sqrt(5));

NODES.forEach((data, index) => {
  const y = 1 - (index / (NODES.length - 1)) * 2;
  const radius = Math.sqrt(1 - y * y);
  const theta = golden * index;
  const position = new THREE.Vector3(Math.cos(theta) * radius * RAD, y * RAD, Math.sin(theta) * radius * RAD);
  const color = PALETTE[index % PALETTE.length];

  const core = new THREE.Mesh(
    new THREE.SphereGeometry(.42, 30, 30),
    new THREE.MeshStandardMaterial({
      color: 0xffffff,
      emissive: color,
      emissiveIntensity: 2.4,
      roughness: .2,
      metalness: .12
    })
  );
  core.position.copy(position);

  const glow = new THREE.Sprite(new THREE.SpriteMaterial({
    map: DOT,
    color,
    transparent: true,
    opacity: .85,
    blending: THREE.AdditiveBlending,
    depthWrite: false
  }));
  glow.position.copy(position);
  glow.scale.setScalar(3);

  const ring = new THREE.Mesh(
    new THREE.TorusGeometry(1.18, .03, 8, 46),
    new THREE.MeshBasicMaterial({
      color,
      transparent: true,
      opacity: 0,
      blending: THREE.AdditiveBlending,
      depthWrite: false
    })
  );
  ring.position.copy(position);
  ring.lookAt(0, 0, 0);

  nodeGroup.add(core, glow, ring);
  nodes.push({ core, glow, ring, position, color, data, targetEmissive: 2.4, targetGlow: .85, targetRing: 0, phase: Math.random() * Math.PI * 2 });
});

const linePositions = [];
const linkPairs = [];
const pairKeys = new Set();
const connectionCount = Array(nodes.length).fill(0);

function connect(a, b) {
  if (a === b) return;
  const key = a < b ? `${a}:${b}` : `${b}:${a}`;
  if (pairKeys.has(key)) return;
  pairKeys.add(key);
  linkPairs.push([a, b]);
  connectionCount[a]++;
  connectionCount[b]++;
  linePositions.push(...nodes[a].position.toArray(), ...nodes[b].position.toArray());
}

for (let i = 0; i < nodes.length; i++) {
  const closest = nodes
    .map((node, j) => ({ j, distance: nodes[i].position.distanceTo(node.position) }))
    .filter(({ j }) => j !== i)
    .sort((a, b) => a.distance - b.distance);

  for (let k = 0; k < 4; k++) connect(i, closest[k].j);
}

const upperRing = [0, 1, 2, 3];
const middleRing = [4, 5, 6, 7];
const lowerRing = [8, 9, 10, 11];
[upperRing, middleRing, lowerRing].forEach((ring) => {
  ring.forEach((nodeIndex, index) => connect(nodeIndex, ring[(index + 1) % ring.length]));
});

for (let i = 0; i < nodes.length; i++) {
  while (connectionCount[i] < 4) {
    const fallback = nodes
      .map((node, j) => ({ j, distance: nodes[i].position.distanceTo(node.position) }))
      .filter(({ j }) => j !== i)
      .sort((a, b) => a.distance - b.distance)
      .find(({ j }) => !pairKeys.has(i < j ? `${i}:${j}` : `${j}:${i}`));
    if (!fallback) break;
    connect(i, fallback.j);
  }
}

const lineGeometry = new THREE.BufferGeometry();
lineGeometry.setAttribute("position", new THREE.Float32BufferAttribute(linePositions, 3));
nodeGroup.add(new THREE.LineSegments(lineGeometry, new THREE.LineBasicMaterial({
  color: 0x4fe0d4,
  transparent: true,
  opacity: .28,
  blending: THREE.AdditiveBlending,
  depthWrite: false
})));

const PULSE_COUNT = 24;
const pulsePositions = new Float32Array(PULSE_COUNT * 3);
const pulseData = [];

for (let i = 0; i < PULSE_COUNT; i++) {
  const [a, b] = linkPairs[Math.floor(Math.random() * linkPairs.length)];
  pulseData.push({ a, b, t: Math.random(), speed: .004 + Math.random() * .008 });
}

const pulseGeometry = new THREE.BufferGeometry();
pulseGeometry.setAttribute("position", new THREE.BufferAttribute(pulsePositions, 3));
nodeGroup.add(new THREE.Points(pulseGeometry, new THREE.PointsMaterial({
  size: .7,
  map: DOT,
  color: 0xccfff8,
  transparent: true,
  opacity: 1,
  blending: THREE.AdditiveBlending,
  depthWrite: false
})));

scene.add(new THREE.AmbientLight(0x223355, .9));
const lightA = new THREE.PointLight(0x4fe0d4, 90, 80);
lightA.position.set(10, 8, 18);
scene.add(lightA);
const lightB = new THREE.PointLight(0x6aa8ff, 60, 80);
lightB.position.set(-14, -6, 10);
scene.add(lightB);

const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2(-2, -2);
const nodeCores = nodes.map((node) => node.core);
let hovered = null;
let mouseX = 0;
let mouseY = 0;
let pointerDownX = 0;
let pointerDownY = 0;
let dragged = false;
let time = 0;
let intro = 0;

let lastTapNode = null;
let lastTapTime = 0;

renderer.domElement.addEventListener("pointerdown", (event) => {
  pointerDownX = event.clientX;
  pointerDownY = event.clientY;
  dragged = false;
  // For touch: update mouse coords on tap so raycaster can pick the node
  mouse.x = (event.clientX / innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / innerHeight) * 2 + 1;
  mouseX = event.clientX;
  mouseY = event.clientY;
});

renderer.domElement.addEventListener("pointermove", (event) => {
  mouse.x = (event.clientX / innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / innerHeight) * 2 + 1;
  mouseX = event.clientX;
  mouseY = event.clientY;
  if (Math.hypot(event.clientX - pointerDownX, event.clientY - pointerDownY) > 6) dragged = true;
});

renderer.domElement.addEventListener("pointerleave", (event) => {
  if (event.pointerType === "mouse") {
    mouse.set(-2, -2);
    setHover(null);
  }
});

renderer.domElement.addEventListener("pointerup", (event) => {
  if (dragged) return;
  // Force raycast at tap position
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(nodeCores, false);
  const wrapper = hits.length ? nodes[nodeCores.indexOf(hits[0].object)] : null;
  if (!wrapper) {
    if (event.pointerType !== "mouse") setHover(null);
    return;
  }
  const url = wrapper.data?.url;
  if (event.pointerType === "mouse") {
    if (url) window.top.location.href = url;
    return;
  }
  // Touch: first tap shows bubble (with clickable CTA), second tap on same node navigates
  setHover(wrapper);
  const now = Date.now();
  if (lastTapNode === wrapper && now - lastTapTime < 2500) {
    if (url) window.top.location.href = url;
    lastTapNode = null;
  } else {
    lastTapNode = wrapper;
    lastTapTime = now;
  }
});

// Tip bubble itself is clickable — works on both desktop and touch.
tip.addEventListener("click", (event) => {
  event.preventDefault();
  const url = tip.getAttribute("href");
  if (url && url !== "#") window.top.location.href = url;
});

function setHover(node) {
  if (hovered === node) return;
  if (hovered) {
    hovered.targetEmissive = 2.4;
    hovered.targetGlow = .85;
    hovered.targetRing = 0;
  }

  hovered = node;
  controls.autoRotate = !node;
  renderer.domElement.style.cursor = node ? "pointer" : "grab";

  if (node) {
    node.targetEmissive = 5;
    node.targetGlow = 1.6;
    node.targetRing = .9;
    tipIcon.textContent = node.data.ic;
    tipTitle.textContent = node.data.title;
    tipBody.textContent = node.data.body;
    if (node.data.url) tip.setAttribute("href", node.data.url);
    tip.classList.add("show");
    tip.setAttribute("aria-hidden", "false");
  } else {
    tip.classList.remove("show");
    tip.setAttribute("aria-hidden", "true");
    tip.setAttribute("href", "#");
  }
}

function placeTip() {
  if (!hovered) return;
  const width = tip.offsetWidth;
  const height = tip.offsetHeight;
  let x = mouseX - 28;
  let y = mouseY - height - 18;
  if (x + width > innerWidth - 12) x = innerWidth - width - 12;
  if (x < 12) x = 12;
  if (y < 12) y = mouseY + 24;
  tip.style.transform = `translate(${x}px, ${y}px) scale(1)`;
}

function animate() {
  requestAnimationFrame(animate);
  time += .01;

  if (intro < 1) {
    intro += .014;
    root.scale.setScalar(.7 + intro * .3);
  }

  const corePulse = 1 + Math.sin(time * 1.2) * .05;
  core1.scale.setScalar(15 * corePulse);
  core2.scale.setScalar(28 * corePulse);
  if (logoPlane.visible) logoPlane.material.opacity += (1 - logoPlane.material.opacity) * .04;
  const logoPulse = 1 + Math.sin(time * 1.1) * .02;
  logoPlane.scale.set(logoPlane.userData.baseWidth * logoPulse, logoPlane.userData.baseHeight * logoPulse, 1);

  nodes.forEach((node) => {
    const pulse = 1 + Math.sin(time * 1.6 + node.phase) * .08;
    node.core.scale.setScalar(pulse);
    node.core.material.emissiveIntensity += (node.targetEmissive - node.core.material.emissiveIntensity) * .12;

    const targetScale = (hovered === node ? 4.4 : 3) * pulse;
    node.glow.scale.setScalar(node.glow.scale.x + (targetScale - node.glow.scale.x) * .12);
    node.glow.material.opacity += (node.targetGlow - node.glow.material.opacity) * .12;
    node.ring.material.opacity += (node.targetRing - node.ring.material.opacity) * .12;
    node.ring.rotation.x += .02;
    node.ring.rotation.y += .015;
  });

  pulseData.forEach((pulse, index) => {
    pulse.t += pulse.speed;
    if (pulse.t >= 1) {
      const [a, b] = linkPairs[Math.floor(Math.random() * linkPairs.length)];
      pulse.a = a;
      pulse.b = b;
      pulse.t = 0;
    }

    const from = nodes[pulse.a].position;
    const to = nodes[pulse.b].position;
    pulsePositions[index * 3] = from.x + (to.x - from.x) * pulse.t;
    pulsePositions[index * 3 + 1] = from.y + (to.y - from.y) * pulse.t;
    pulsePositions[index * 3 + 2] = from.z + (to.z - from.z) * pulse.t;
  });

  pulseGeometry.attributes.position.needsUpdate = true;
  dustA.rotation.y -= .0005;
  dustB.rotation.y += .0007;
  dustC.rotation.y -= .001;

  controls.update();
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(nodeCores, false);
  setHover(hits.length ? nodes[nodeCores.indexOf(hits[0].object)] : null);
  placeTip();
  // 1) Base scene → canvas with full transparency.
  renderer.setRenderTarget(null);
  renderer.setClearColor(0x000000, 0);
  renderer.clear(true, true, true);
  renderer.render(scene, camera);

  // 2) Bloom-only pass → offscreen RT (clears to fully transparent black).
  bloomComposer.render();

  // 3) Additively blit bloom RT on top of the canvas (no alpha overwrite).
  const previousAutoClear = renderer.autoClear;
  renderer.autoClear = false;
  renderer.render(blitScene, blitCamera);

  // 4) Logo overlay on top, keeping depth cleared so it always wins.
  renderer.clearDepth();
  renderer.render(logoScene, camera);
  renderer.autoClear = previousAutoClear;
}

addEventListener("resize", () => {
  const pr = Math.min(devicePixelRatio || 1, 3);
  renderer.setPixelRatio(pr);
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  bloomComposer.setPixelRatio(pr);
  bloomComposer.setSize(innerWidth, innerHeight);
  bloomPass.setSize(innerWidth * pr, innerHeight * pr);
  blitMaterial.uniforms.tDiffuse.value = bloomComposer.renderTarget2.texture;
});

animate();
</script>
</body>
</html>
